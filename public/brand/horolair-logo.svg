<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">HoroLair logo</title>
  <desc id="desc">Circular black and gold HoroLair monogram inspired by a watch dial.</desc>
  <defs>
    <radialGradient id="dial" cx="48%" cy="36%" r="66%">
      <stop offset="0%" stop-color="#171515" />
      <stop offset="58%" stop-color="#0b0a09" />
      <stop offset="100%" stop-color="#030303" />
    </radialGradient>
    <linearGradient id="gold" x1="26%" x2="78%" y1="12%" y2="92%">
      <stop offset="0%" stop-color="#f3d991" />
      <stop offset="42%" stop-color="#bd8840" />
      <stop offset="70%" stop-color="#f0d08a" />
      <stop offset="100%" stop-color="#8a5a23" />
    </linearGradient>
    <filter id="softDepth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.72" />
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#f4d38a" flood-opacity="0.25" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="248" fill="url(#dial)" />
  <circle cx="256" cy="256" r="231" fill="none" stroke="#0a0908" stroke-width="18" opacity="0.78" />
  <path
    d="M70 305a190 190 0 0 1 372 0"
    fill="none"
    stroke="url(#gold)"
    stroke-linecap="round"
    stroke-width="6"
    opacity="0.86"
  />
  <path
    d="M165 275a105 105 0 1 1 170 0"
    fill="none"
    stroke="url(#gold)"
    stroke-linecap="round"
    stroke-width="4"
    opacity="0.74"
  />

  <g stroke="url(#gold)" stroke-linecap="round" stroke-width="5" opacity="0.86">
    <path d="M256 62v22" />
    <path d="M362 90l-11 20" />
    <path d="M440 168l-20 11" />
    <path d="M468 256h-22" />
    <path d="M72 256h22" />
    <path d="M150 90l11 20" />
    <path d="M72 168l20 11" />
  </g>

  <g filter="url(#softDepth)" fill="url(#gold)" text-anchor="middle">
    <text x="256" y="279" font-family="Georgia, 'Times New Roman', serif" font-size="156" font-weight="700" letter-spacing="-18">
      HL
    </text>
    <text x="256" y="366" font-family="Georgia, 'Times New Roman', serif" font-size="50" letter-spacing="13">
      HOROLAIR
    </text>
  </g>

  <g fill="url(#gold)" opacity="0.92">
    <path d="M256 396l8 23 23 8-23 8-8 23-8-23-23-8 23-8z" />
    <rect x="155" y="425" width="70" height="3" rx="1.5" />
    <rect x="287" y="425" width="70" height="3" rx="1.5" />
  </g>
</svg>
